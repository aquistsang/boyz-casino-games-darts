<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bar Darts — Boyz Casino</title>
  <style>
    :root {
      --bg: #1a0e0a;
      --bg-deep: #0f0806;
      --gold: #f5c842;
      --gold-dim: #c9a030;
      --red: #d94a3a;
      --wood: #3d2418;
      --wood-light: #5c3a28;
      --cream: #f2e6d4;
      --glass: rgba(40, 22, 14, 0.72);
      --glass-border: rgba(245, 200, 66, 0.22);
      --green: #4a9a5a;
      --blue: #4a7aaa;
      --orange: #e8943a;
      --miss: #2d1a12;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      --radius: 16px;
      --font-display: "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-display);
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245, 200, 66, 0.12), transparent 55%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(217, 74, 58, 0.1), transparent 50%),
        radial-gradient(ellipse 50% 35% at 10% 80%, rgba(74, 154, 90, 0.08), transparent 45%),
        linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 40%, #241410 100%);
      padding: 16px 12px 40px;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 48px,
          rgba(255, 255, 255, 0.012) 48px,
          rgba(255, 255, 255, 0.012) 49px
        );
      opacity: 0.6;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
    }

    header.brand {
      text-align: center;
      margin-bottom: 14px;
      animation: brandIn 0.7s ease-out both;
    }

    .brand-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 4px;
    }

    .brand h1 {
      font-size: clamp(1.85rem, 6vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #fff6d6 0%, var(--gold) 45%, #e8943a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 2px 8px rgba(245, 200, 66, 0.25));
    }

    .brand p {
      margin-top: 4px;
      font-size: 0.85rem;
      color: rgba(242, 230, 212, 0.65);
    }

    @keyframes brandIn {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel {
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .balance-block .label,
    .venue-block .label {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(242, 230, 212, 0.5);
    }

    .balance-value {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .balance-value.pulse {
      transform: scale(1.08);
      color: #fff6d6;
    }

    .venue-block { text-align: right; }

    .venue-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--cream);
    }

    .season-wrap { margin-top: 10px; }

    .season-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(242, 230, 212, 0.55);
      margin-bottom: 5px;
    }

    .season-bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(245, 200, 66, 0.15);
      overflow: hidden;
    }

    .season-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), var(--gold), #fff6d6);
      box-shadow: 0 0 12px rgba(245, 200, 66, 0.45);
      transition: width 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bonus-pill {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto 12px;
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(245, 200, 66, 0.95), rgba(232, 148, 58, 0.9));
      color: #1a0e0a;
      font-weight: 800;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      box-shadow: 0 0 24px rgba(245, 200, 66, 0.55), 0 4px 16px rgba(0, 0, 0, 0.3);
      animation: bonusPulse 1.2s ease-in-out infinite;
    }

    .bonus-pill.active { display: inline-flex; }

    .bonus-pill .throws {
      background: rgba(26, 14, 10, 0.2);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
    }

    @keyframes bonusPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.04); filter: brightness(1.08); }
    }

    .board-stage {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin: 0 auto 14px;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid rgba(245, 200, 66, 0.28);
      box-shadow:
        0 0 0 4px rgba(61, 36, 24, 0.8),
        0 20px 50px rgba(0, 0, 0, 0.5),
        inset 0 0 60px rgba(0, 0, 0, 0.35);
      background: radial-gradient(circle at 50% 40%, #3a2218, #1a0e0a 70%);
      animation: stageIn 0.8s ease-out both;
    }

    @keyframes stageIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    #dartboard {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    #dartboard.disabled,
    #dartboard.auto-mode {
      cursor: not-allowed;
    }

    .result-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 5;
      background: radial-gradient(circle, rgba(26, 14, 10, 0.55) 0%, transparent 70%);
    }

    .result-overlay.show {
      opacity: 1;
      transform: scale(1);
    }

    .result-card {
      text-align: center;
      padding: 18px 28px;
      border-radius: 18px;
      background: rgba(26, 14, 10, 0.88);
      border: 1px solid rgba(245, 200, 66, 0.45);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(245, 200, 66, 0.2);
      min-width: 160px;
    }

    .result-mult {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(245, 200, 66, 0.5);
    }

    .result-mult.miss { color: #9a8a7a; text-shadow: none; }
    .result-mult.bonus { color: #fff6d6; animation: multFlash 0.4s ease; }

    @keyframes multFlash {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .result-win {
      margin-top: 4px;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--green);
    }

    .result-win.loss { color: #9a8a7a; }

    .result-zone {
      margin-top: 6px;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(242, 230, 212, 0.7);
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .bet-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .bet-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(242, 230, 212, 0.55);
      width: 100%;
    }

    .bet-input-wrap {
      flex: 1 1 120px;
      position: relative;
    }

    .bet-input-wrap::before {
      content: "$";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-dim);
      font-weight: 600;
      pointer-events: none;
    }

    #betInput {
      width: 100%;
      padding: 11px 12px 11px 26px;
      border-radius: 12px;
      border: 1px solid rgba(245, 200, 66, 0.25);
      background: rgba(0, 0, 0, 0.35);
      color: var(--cream);
      font-size: 1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #betInput:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245, 200, 66, 0.15);
    }

    .quick-bets {
      display: flex;
      gap: 6px;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
      transition: transform 0.15s ease, background 0.2s, box-shadow 0.2s, opacity 0.2s;
    }

    button:active:not(:disabled) { transform: scale(0.96); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-quick {
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(92, 58, 40, 0.7);
      border: 1px solid rgba(245, 200, 66, 0.2);
      color: var(--cream);
      font-weight: 700;
      font-size: 0.85rem;
    }

    .btn-quick:hover:not(:disabled) {
      background: rgba(245, 200, 66, 0.2);
      border-color: var(--gold);
    }

    .mode-row {
      display: flex;
      gap: 8px;
    }

    .btn-mode {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(245, 200, 66, 0.18);
      color: rgba(242, 230, 212, 0.7);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .btn-mode.active {
      background: linear-gradient(135deg, rgba(245, 200, 66, 0.35), rgba(232, 148, 58, 0.25));
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 16px rgba(245, 200, 66, 0.2);
    }

    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(242, 230, 212, 0.45);
      margin-top: 2px;
    }

    .history-wrap { margin-top: 4px; }

    .history-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(242, 230, 212, 0.5);
      margin-bottom: 8px;
    }

    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 34px;
    }

    .chip {
      min-width: 48px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      text-align: center;
      animation: chipIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .chip.high {
      background: linear-gradient(135deg, #f5c842, #e8943a);
      color: #1a0e0a;
      box-shadow: 0 0 12px rgba(245, 200, 66, 0.35);
    }

    .chip.mid {
      background: rgba(74, 154, 90, 0.35);
      border: 1px solid rgba(74, 154, 90, 0.6);
      color: #8fd99c;
    }

    .chip.low {
      background: rgba(120, 110, 100, 0.25);
      border: 1px solid rgba(150, 140, 130, 0.35);
      color: #b0a89e;
    }

    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.6) translateY(6px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      justify-content: center;
      margin-top: 10px;
      font-size: 0.68rem;
      color: rgba(242, 230, 212, 0.5);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(26, 14, 10, 0.95);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 420px) {
      body { padding: 10px 8px 32px; }
      .panel { padding: 10px 12px; }
      .balance-value { font-size: 1.25rem; }
      .result-mult { font-size: 2rem; }
      .btn-quick { padding: 10px 11px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <div class="wrap">
    <header class="brand">
      <div class="brand-eyebrow">Boyz Casino</div>
      <h1>BAR DARTS</h1>
      <p>Aim true. Hit gold. Chase the frenzy.</p>
    </header>

    <div class="panel">
      <div class="top-row">
        <div class="balance-block">
          <div class="label">Balance</div>
          <div class="balance-value" id="balanceDisplay">$1,000.00</div>
        </div>
        <div class="venue-block">
          <div class="label">Venue</div>
          <div class="venue-name" id="venueName">The Rusty Bull</div>
        </div>
      </div>
      <div class="season-wrap">
        <div class="season-label">
          <span>Season</span>
          <span id="seasonPct">0%</span>
        </div>
        <div class="season-bar">
          <div class="season-fill" id="seasonFill"></div>
        </div>
      </div>
    </div>

    <div class="bonus-pill" id="bonusPill">
      ✨ BULLSEYE BONUS
      <span class="throws" id="bonusThrows">3 left</span>
    </div>

    <div class="board-stage">
      <canvas id="dartboard" width="520" height="520" aria-label="Dartboard"></canvas>
      <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
          <div class="result-mult" id="resultMult">100×</div>
          <div class="result-win" id="resultWin">+ $0.00</div>
          <div class="result-zone" id="resultZone">Bullseye</div>
        </div>
      </div>
    </div>

    <div class="panel controls">
      <div>
        <div class="bet-label">Bet amount</div>
        <div class="bet-row">
          <div class="bet-input-wrap">
            <input type="number" id="betInput" min="0.01" max="100" step="0.01" value="1.00" />
          </div>
          <div class="quick-bets">
            <button type="button" class="btn-quick" data-bet="10">10</button>
            <button type="button" class="btn-quick" data-bet="100">100</button>
            <button type="button" class="btn-quick" id="btnDouble">2×</button>
          </div>
        </div>
      </div>

      <div>
        <div class="bet-label">Shooting mode</div>
        <div class="mode-row">
          <button type="button" class="btn-mode active" id="btnManual">Manual</button>
          <button type="button" class="btn-mode" id="btnAuto">Auto</button>
        </div>
        <p class="hint" id="modeHint">Tap the board to throw</p>
      </div>
    </div>

    <div class="panel history-wrap">
      <div class="history-label">Last throws</div>
      <div class="history" id="history"></div>
      <div class="legend">
        <span><i class="dot" style="background:#f5c842"></i> High (50×+)</span>
        <span><i class="dot" style="background:#4a9a5a"></i> Mid (12–25×)</span>
        <span><i class="dot" style="background:#888"></i> Low / Miss</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function () {
      "use strict";

      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
          const radii = typeof r === "number" ? [r, r, r, r] : r;
          const [tl, tr, br, bl] = radii;
          this.beginPath();
          this.moveTo(x + tl, y);
          this.lineTo(x + w - tr, y);
          this.quadraticCurveTo(x + w, y, x + w, y + tr);
          this.lineTo(x + w, y + h - br);
          this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
          this.lineTo(x + bl, y + h);
          this.quadraticCurveTo(x, y + h, x, y + h - bl);
          this.lineTo(x, y + tl);
          this.quadraticCurveTo(x, y, x + tl, y);
          this.closePath();
          return this;
        };
      }

      const ZONES = [
        { name: "Bullseye", mult: 100, radius: 28, color: "#f5c842", progress: 2.0 },
        { name: "Inner Ring", mult: 50, radius: 60, color: "#d94a3a", progress: 1.5 },
        { name: "Mid Ring", mult: 25, radius: 100, color: "#e8943a", progress: 1.2 },
        { name: "Outer Ring", mult: 12, radius: 140, color: "#4a9a5a", progress: 1.0 },
        { name: "Edge Ring", mult: 6, radius: 178, color: "#4a7aaa", progress: 0.8 },
        { name: "Miss", mult: 0, radius: 210, color: "#2d1a12", progress: 0.2 }
      ];

      const VENUES = [
        "The Rusty Bull",
        "The Golden Arrow",
        "The Bullseye Pub",
        "Dart & Dram",
        "The Feathered Flight",
        "Copper Cork Tavern",
        "The Triple Twenty",
        "Oak & Oche"
      ];

      const MIN_BET = 0.01;
      const MAX_BET = 100;
      const AUTO_INTERVAL = 1500;
      const FLIGHT_MS = 720;
      const OVERLAY_MS = 1800;

      const canvas = document.getElementById("dartboard");
      const ctx = canvas.getContext("2d");
      const balanceDisplay = document.getElementById("balanceDisplay");
      const venueName = document.getElementById("venueName");
      const seasonFill = document.getElementById("seasonFill");
      const seasonPct = document.getElementById("seasonPct");
      const bonusPill = document.getElementById("bonusPill");
      const bonusThrowsEl = document.getElementById("bonusThrows");
      const resultOverlay = document.getElementById("resultOverlay");
      const resultMult = document.getElementById("resultMult");
      const resultWin = document.getElementById("resultWin");
      const resultZone = document.getElementById("resultZone");
      const betInput = document.getElementById("betInput");
      const btnManual = document.getElementById("btnManual");
      const btnAuto = document.getElementById("btnAuto");
      const modeHint = document.getElementById("modeHint");
      const historyEl = document.getElementById("history");
      const toastEl = document.getElementById("toast");

      const state = {
        balance: 1000,
        bet: 1,
        progress: 0,
        venueIndex: 0,
        goldenZone: 0,
        mode: "manual",
        isBonusActive: false,
        bonusThrows: 0,
        history: [],
        isFlying: false,
        autoTimer: null,
        glowPhase: 0,
        particles: [],
        dart: null,
        overlayTimer: null
      };

      function formatMoney(n) {
        return "$" + n.toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function clampBet(v) {
        if (Number.isNaN(v) || v < MIN_BET) return MIN_BET;
        if (v > MAX_BET) return MAX_BET;
        return Math.round(v * 100) / 100;
      }

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => toastEl.classList.remove("show"), 2200);
      }

      function updateUI() {
        balanceDisplay.textContent = formatMoney(state.balance);
        venueName.textContent = VENUES[state.venueIndex];
        const pct = Math.min(100, state.progress);
        seasonFill.style.width = pct + "%";
        seasonPct.textContent = pct.toFixed(1) + "%";

        if (state.isBonusActive) {
          bonusPill.classList.add("active");
          bonusThrowsEl.textContent = state.bonusThrows + " left";
        } else {
          bonusPill.classList.remove("active");
        }

        betInput.value = state.bet.toFixed(2);
        canvas.classList.toggle("auto-mode", state.mode === "auto");
        canvas.classList.toggle("disabled", state.isFlying);
      }

      function pulseBalance() {
        balanceDisplay.classList.add("pulse");
        setTimeout(() => balanceDisplay.classList.remove("pulse"), 220);
      }

      function pickGoldenZone() {
        state.goldenZone = Math.floor(Math.random() * 5);
      }

      function getZoneIndex(dist) {
        for (let i = 0; i < ZONES.length; i++) {
          if (dist <= ZONES[i].radius) return i;
        }
        return ZONES.length - 1;
      }

      function canvasPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function drawBoard() {
        const w = canvas.width;
        const h = canvas.height;
        const cx = w / 2;
        const cy = h / 2;

        ctx.clearRect(0, 0, w, h);

        const woodGrad = ctx.createRadialGradient(cx, cy, 40, cx, cy, 260);
        woodGrad.addColorStop(0, "#4a2e20");
        woodGrad.addColorStop(0.6, "#2a1810");
        woodGrad.addColorStop(1, "#140a08");
        ctx.fillStyle = woodGrad;
        ctx.fillRect(0, 0, w, h);

        for (let i = ZONES.length - 1; i >= 0; i--) {
          const zone = ZONES[i];
          const prevR = i === 0 ? 0 : ZONES[i - 1].radius;

          ctx.beginPath();
          ctx.arc(cx, cy, zone.radius, 0, Math.PI * 2);
          if (i > 0) {
            ctx.arc(cx, cy, prevR, 0, Math.PI * 2, true);
          }
          ctx.fillStyle = zone.color;
          ctx.fill();

          if (i < ZONES.length - 1) {
            ctx.beginPath();
            ctx.arc(cx, cy, zone.radius, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(0,0,0,0.35)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }

        // Wire rings highlight
        for (let i = 0; i < ZONES.length - 1; i++) {
          ctx.beginPath();
          ctx.arc(cx, cy, ZONES[i].radius, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.12)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        // Golden glow
        const g = state.goldenZone;
        const gOuter = ZONES[g].radius;
        const gInner = g === 0 ? 0 : ZONES[g - 1].radius;
        const pulse = 0.45 + 0.35 * Math.sin(state.glowPhase);

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, gOuter + 4, 0, Math.PI * 2);
        if (gInner > 0) ctx.arc(cx, cy, Math.max(0, gInner - 2), 0, Math.PI * 2, true);
        ctx.shadowColor = `rgba(245, 200, 66, ${0.55 + pulse * 0.4})`;
        ctx.shadowBlur = 18 + pulse * 22;
        ctx.fillStyle = `rgba(245, 200, 66, ${0.12 + pulse * 0.1})`;
        ctx.fill();
        ctx.restore();

        ctx.beginPath();
        ctx.arc(cx, cy, gOuter, 0, Math.PI * 2);
        if (gInner > 0) ctx.arc(cx, cy, gInner, 0, Math.PI * 2, true);
        ctx.strokeStyle = `rgba(255, 230, 140, ${0.55 + pulse * 0.4})`;
        ctx.lineWidth = 3.5;
        ctx.stroke();

        // Multiplier labels
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (let i = 0; i < ZONES.length - 1; i++) {
          const outer = ZONES[i].radius;
          const inner = i === 0 ? 0 : ZONES[i - 1].radius;
          const midR = (outer + inner) / 2;
          const labelY = i === 0 ? cy : cy - midR;

          ctx.font = i === 0 ? "bold 13px Segoe UI, sans-serif" : "bold 12px Segoe UI, sans-serif";
          ctx.fillStyle = i === 0 ? "#1a0e0a" : "rgba(255,255,255,0.92)";
          ctx.strokeStyle = i === 0 ? "transparent" : "rgba(0,0,0,0.45)";
          ctx.lineWidth = 3;
          const label = ZONES[i].mult + "×";
          if (i !== 0) ctx.strokeText(label, cx, labelY);
          ctx.fillText(label, cx, labelY);

          if (i === state.goldenZone) {
            ctx.font = "10px Segoe UI, sans-serif";
            ctx.fillStyle = "#fff6d6";
            ctx.fillText("★ GOLD", cx, labelY + (i === 0 ? 14 : 12));
          }
        }

        // Particles
        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.03;
          p.vy += 0.08;
          if (p.life <= 0) {
            state.particles.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        // Flying dart
        if (state.dart) {
          drawDart(state.dart.x, state.dart.y, state.dart.angle);
        }
      }

      function drawDart(x, y, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Shaft
        ctx.fillStyle = "#c9a882";
        ctx.fillRect(-3, -28, 6, 32);

        // Flights
        ctx.fillStyle = "#d94a3a";
        ctx.beginPath();
        ctx.moveTo(-3, -28);
        ctx.lineTo(-14, -40);
        ctx.lineTo(-3, -34);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(3, -28);
        ctx.lineTo(14, -40);
        ctx.lineTo(3, -34);
        ctx.closePath();
        ctx.fill();

        // Tip
        ctx.fillStyle = "#e8e0d4";
        ctx.beginPath();
        ctx.moveTo(-3, 4);
        ctx.lineTo(3, 4);
        ctx.lineTo(0, 16);
        ctx.closePath();
        ctx.fill();

        // Barrel
        ctx.fillStyle = "#f5c842";
        ctx.beginPath();
        ctx.roundRect(-4, -6, 8, 12, 2);
        ctx.fill();

        ctx.restore();
      }

      function spawnImpact(x, y, color) {
        for (let i = 0; i < 18; i++) {
          const a = (Math.PI * 2 * i) / 18 + Math.random() * 0.3;
          const sp = 1.5 + Math.random() * 3.5;
          state.particles.push({
            x, y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: 0.7 + Math.random() * 0.4,
            size: 2 + Math.random() * 3,
            color: Math.random() > 0.4 ? color : "#fff6d6"
          });
        }
      }

      function addHistory(mult) {
        state.history.unshift(mult);
        if (state.history.length > 8) state.history.pop();
        renderHistory();
      }

      function renderHistory() {
        historyEl.innerHTML = "";
        state.history.forEach((m) => {
          const chip = document.createElement("div");
          chip.className = "chip";
          if (m >= 50) chip.classList.add("high");
          else if (m >= 12) chip.classList.add("mid");
          else chip.classList.add("low");
          chip.textContent = m + "×";
          historyEl.appendChild(chip);
        });
      }

      function showResult(zone, win, bonusHit) {
        resultMult.textContent = zone.mult + "×";
        resultMult.className = "result-mult";
        if (zone.mult === 0) resultMult.classList.add("miss");
        if (bonusHit) resultMult.classList.add("bonus");

        if (win > 0) {
          resultWin.textContent = "+ " + formatMoney(win);
          resultWin.className = "result-win";
        } else {
          resultWin.textContent = "— " + formatMoney(state.bet);
          resultWin.className = "result-win loss";
        }

        let zoneLabel = zone.name;
        if (bonusHit) zoneLabel += " · 2× BONUS";
        resultZone.textContent = zoneLabel;

        resultOverlay.classList.add("show");
        clearTimeout(state.overlayTimer);
        state.overlayTimer = setTimeout(() => {
          resultOverlay.classList.remove("show");
        }, OVERLAY_MS);
      }

      function advanceSeason(zone) {
        let add = zone.progress;
        state.progress += add;
        if (state.progress >= 100) {
          state.progress = 0;
          state.venueIndex = (state.venueIndex + 1) % VENUES.length;
          pickGoldenZone();
          showToast("New venue: " + VENUES[state.venueIndex]);
        }
      }

      function canAfford() {
        return state.balance >= state.bet - 1e-9;
      }

      function shootAt(tx, ty) {
        if (state.isFlying) return;
        if (!canAfford()) {
          showToast("Not enough balance");
          stopAuto();
          return;
        }

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const dx = tx - cx;
        const dy = ty - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Clamp to board edge for visual
        const maxR = ZONES[ZONES.length - 1].radius;
        let landX = tx;
        let landY = ty;
        if (dist > maxR) {
          const s = maxR / dist;
          landX = cx + dx * s;
          landY = cy + dy * s;
        }

        const zoneIdx = getZoneIndex(Math.min(dist, maxR + 1));
        const zone = ZONES[zoneIdx];
        const isGolden = zoneIdx === state.goldenZone;

        state.balance = Math.round((state.balance - state.bet) * 100) / 100;
        pulseBalance();
        updateUI();

        state.isFlying = true;
        updateUI();

        const startX = canvas.width / 2;
        const startY = -20;
        const startTime = performance.now();
        const peakLift = -40 - Math.random() * 30;

        function frame(now) {
          const t = Math.min(1, (now - startTime) / FLIGHT_MS);
          const e = easeInOutCubic(t);
          const x = startX + (landX - startX) * e;
          const y = startY + (landY - startY) * e + Math.sin(e * Math.PI) * peakLift;
          const angle = Math.atan2(landY - startY, landX - startX) + Math.PI / 2;

          state.dart = { x, y, angle };
          if (t < 1) {
            requestAnimationFrame(frame);
          } else {
            state.dart = { x: landX, y: landY, angle };
            spawnImpact(landX, landY, isGolden ? "#f5c842" : zone.color);
            resolveShot(zone, zoneIdx, isGolden);
          }
        }
        requestAnimationFrame(frame);
      }

      function resolveShot(zone, zoneIdx, isGolden) {
        let mult = zone.mult;
        let bonusHit = false;

        if (state.isBonusActive) {
          state.bonusThrows -= 1;
          if (isGolden && mult > 0) {
            mult *= 2;
            bonusHit = true;
          }
          if (state.bonusThrows <= 0) {
            state.isBonusActive = false;
            state.bonusThrows = 0;
          }
        } else if (isGolden && zone.mult > 0) {
          state.isBonusActive = true;
          state.bonusThrows = 3;
          showToast("✨ Bullseye Frenzy activated!");
        }

        const win = Math.round(state.bet * mult * 100) / 100;
        if (win > 0) {
          state.balance = Math.round((state.balance + win) * 100) / 100;
          pulseBalance();
        }

        addHistory(zone.mult);
        advanceSeason(zone);
        showResult(zone, win, bonusHit);

        setTimeout(() => {
          state.isFlying = false;
          state.dart = null;
          updateUI();
          if (state.mode === "auto") scheduleAuto();
        }, 280);
      }

      function shootRandom() {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        // Weighted toward mid-board for more interesting auto play
        const angle = Math.random() * Math.PI * 2;
        const r = Math.pow(Math.random(), 0.65) * 200;
        shootAt(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
      }

      function scheduleAuto() {
        clearTimeout(state.autoTimer);
        if (state.mode !== "auto" || state.isFlying) return;
        if (!canAfford()) {
          showToast("Auto stopped — low balance");
          setMode("manual");
          return;
        }
        state.autoTimer = setTimeout(() => {
          if (state.mode === "auto" && !state.isFlying) shootRandom();
        }, AUTO_INTERVAL);
      }

      function stopAuto() {
        clearTimeout(state.autoTimer);
        state.autoTimer = null;
      }

      function setMode(mode) {
        state.mode = mode;
        btnManual.classList.toggle("active", mode === "manual");
        btnAuto.classList.toggle("active", mode === "auto");
        modeHint.textContent = mode === "manual"
          ? "Tap the board to throw"
          : "Auto-throwing every 1.5s";
        updateUI();
        if (mode === "auto") {
          scheduleAuto();
        } else {
          stopAuto();
        }
      }

      function handlePointer(clientX, clientY) {
        if (state.mode !== "manual" || state.isFlying) return;
        const p = canvasPoint(clientX, clientY);
        shootAt(p.x, p.y);
      }

      canvas.addEventListener("click", (e) => {
        handlePointer(e.clientX, e.clientY);
      });

      canvas.addEventListener("touchstart", (e) => {
        if (e.touches.length === 0) return;
        e.preventDefault();
        const t = e.touches[0];
        handlePointer(t.clientX, t.clientY);
      }, { passive: false });

      btnManual.addEventListener("click", () => setMode("manual"));
      btnAuto.addEventListener("click", () => setMode("auto"));

      document.querySelectorAll("[data-bet]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.bet = clampBet(parseFloat(btn.dataset.bet));
          updateUI();
        });
      });

      document.getElementById("btnDouble").addEventListener("click", () => {
        state.bet = clampBet(state.bet * 2);
        updateUI();
      });

      betInput.addEventListener("change", () => {
        state.bet = clampBet(parseFloat(betInput.value));
        updateUI();
      });

      betInput.addEventListener("blur", () => {
        state.bet = clampBet(parseFloat(betInput.value));
        updateUI();
      });

      function loop() {
        state.glowPhase += 0.05;
        drawBoard();
        requestAnimationFrame(loop);
      }

      pickGoldenZone();
      updateUI();
      renderHistory();
      loop();
    })();
  </script>
</body>
</html>
